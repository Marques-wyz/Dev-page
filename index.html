<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">

  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="matrix"></canvas>

  <div class="container">
    <div class="card">
      <h1>Cauã Marques</h1>
      <p>Email: <a href="mailto:cauamarques09sp@gmail.com">cauamarques09sp@gmail.com</a></p>
      <div class="projetos">
        <h2>Projetos</h2>
        <ul>
          <li>Sistema de RH (Java / NetBeans)</li>
          <li>Sistema Contábil com Interface de Pagamentos (Java / POO)</li>
          <li>Site com efeito Matrix (HTML/CSS)</li>

        </ul>
      </div>

      <div class="download">
        <a href="Curriculum Cauã Marques.pdf" class="curriculo-btn" download>
      🔽 Baixar Currículo

  <script>
    // Matrix Animation
    const canvas = document.getElementById("matrix");
    const ctx = canvas.getContext("2d");

    canvas.height = window.innerHeight;
    canvas.width = window.innerWidth;

    const letters = "01";
    const fontSize = 14;
    const columns = canvas.width / fontSize;
    const drops = Array(Math.floor(columns)).fill(1);

    function draw() {
      ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = "#00BFFF";
      ctx.font = `${fontSize}px monospace`;

      for (let i = 0; i < drops.length; i++) {
        const text = letters[Math.floor(Math.random() * letters.length)];
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);

        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
          drops[i] = 0;
        }
        drops[i]++;
      }
    }

    setInterval(draw, 33);

    // Baixar currículo
    function baixarCurriculo() {
      window.open("./Curriculo_Caua_Marques.pdf", "_blank");
    }
  </script>
</body>
